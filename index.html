<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="London App">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="stylesheet" href="styles.css">
<title>London App</title>
</head>
<body>

<!-- PIN Lock Screen -->
<div class="lock" id="lockScreen">
<img class="lock-ico" src="favicon.png" alt="">
<div class="lock-t">London App</div>
<div class="lock-s">Inserisci PIN</div>
<div class="pin-wrap" id="pinDots"></div>
<div class="pin-pad" id="pinPad"></div>
<div id="pinMsg" style="font-size:12px;color:var(--tx3);margin-top:8px;height:16px"></div>
</div>

<!-- App Shell -->
<div class="shell">
<div class="top">
  <div>
    <h1><img class="top-ico" id="hdr-ico" src="favicon.png" alt=""><span id="hdr-name">London App</span></h1>
  </div>
  <button class="menu-btn" onclick="toggleMenu()">&#x22EE;</button>
</div>

<!-- Tab: Piano -->
<div class="pg on" id="p1">
  <div class="pills" id="pls"></div>
  <div class="prog"><div class="prog-bar" id="pbar" style="width:0%"></div></div>
  
  <!-- <div class="piano-search"><div class="piano-search-box"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="position:absolute;left:10px;top:50%;transform:translateY(-50%)"><circle cx="7" cy="7" r="5" stroke="var(--tx3)" stroke-width="1.5"/><path d="M11 11l3.5 3.5" stroke="var(--tx3)" stroke-width="1.5" stroke-linecap="round"/></svg><input type="text" id="piano-si" class="piano-si" placeholder="Cerca o aggiungi tappa..." oninput="pianoSearch()" onfocus="pianoSearch()"></div><div id="piano-sr" class="piano-sr"></div></div> -->
  <!-- <div class="piano-search">
    <input type="text" id="piano-si" class="piano-si" placeholder="Cerca o aggiungi tappa..." oninput="pianoSearch()" onfocus="pianoSearch()">
    <div id="piano-sr" class="piano-sr"></div>
  </div>-->


  <div class="piano-search">
    <div class="piano-search-box">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="position:absolute;left:10px;top:50%;transform:translateY(-50%)">
        <circle cx="7" cy="7" r="5" stroke="var(--tx3)" stroke-width="1.5"/>
        <path d="M11 11l3.5 3.5" stroke="var(--tx3)" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <input type="text" id="piano-si" class="piano-si" placeholder="Cerca o aggiungi tappa..." oninput="pianoSearch()" onfocus="pianoSearch()">
    </div>
    <div id="piano-sr" class="piano-sr"></div>
  </div>
  
  
<div class="gps-wrap"><div id="gmap"></div><button class="gps-btn" onclick="doLocate()">&#x1F4CD; Tu sei qui</button></div>
  <div id="dc"></div>
</div>

<!-- Tab: Cerca -->
<div class="pg" id="p2">
  <div class="srw">
    <div class="srbox">
      <input class="srin" type="text" id="si" placeholder="Cerca luogo, pub, metro...">
    </div>
    <div class="scps" id="scp"></div>
    <div id="srs"></div>
    <div id="nom-results"></div>
  </div>
</div>

<!-- Tab: Trasporti -->
<div class="pg" id="p3"><div class="iw" id="trw"></div></div>

<!-- Tab: Meteo -->
<div class="pg" id="p4"><div class="iw" id="mtw"></div></div>

<!-- Tab: Pint Counter -->
<div class="pg" id="p6"><div class="iw" id="beerw"></div></div>

<!-- Tab: Info -->
<div class="pg" id="p5"><div class="iw" id="ifw"></div></div>
</div>

<!-- Bottom Nav -->
<nav class="nav">
<button class="on" data-p="p1"><span class="ni"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><rect width="28" height="28" rx="7" fill="#3b82f6"/><rect x="6" y="6" width="16" height="16" rx="2" stroke="#fff" stroke-width="1.5" fill="none"/><path d="M6 11h16" stroke="#fff" stroke-width="1.2"/><path d="M11 6v16M16 6v16" stroke="#fff" stroke-width=".8" opacity=".5"/></svg></span></button>
<button data-p="p3"><span class="ni"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><rect width="28" height="28" rx="7" fill="#DC241F"/><circle cx="14" cy="14" r="8" stroke="#fff" stroke-width="1.5" fill="none"/><rect x="6" y="11.5" width="16" height="5" rx=".8" fill="#1a3a7a"/></svg></span></button>
<button data-p="p4"><span class="ni"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><rect width="28" height="28" rx="7" fill="#0ea5e9"/><circle cx="13" cy="12" r="4" fill="#fbbf24"/><path d="M13 6v1.5M13 17.5v1.5M7 12H5.5M20.5 12H19M8.2 7.2l1 1M17.8 16.8l1 1M8.2 16.8l1-1M17.8 7.2l1-1" stroke="#fbbf24" stroke-width="1.3" stroke-linecap="round"/><path d="M9.5 22c0-2.5 2-4.5 5-4.5s5 2 5 4.5" fill="#fff"/></svg></span></button>
<button data-p="p6"><span class="ni"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><rect width="28" height="28" rx="7" fill="#1a0a00"/><path d="M9 6h10v2c0 0 1 0 1 1v11c0 1.5-1 2-2 2H10c-1 0-2-.5-2-2V9c0-1 1-1 1-1V6z" fill="#2a1500" stroke="#BA7517" stroke-width="1.2"/><rect x="9" y="6" width="10" height="4" rx=".5" fill="#f5e6c8"/><path d="M19 9h2.5c.5 0 1 .5 1 1v3c0 .5-.5 1-1 1H19" stroke="#BA7517" stroke-width="1.2" fill="none"/></svg></span></button>
<button data-p="p5"><span class="ni"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><rect width="28" height="28" rx="7" fill="#6b7280"/><circle cx="14" cy="9.5" r="2" fill="#fff"/><rect x="12" y="13" width="4" height="9" rx="1.2" fill="#fff"/></svg></span></button>
</nav>

<!-- Phrase Overlay -->
<div class="ph-overlay" id="phrase-overlay" onclick="if(event.target===this)closePhrases()">
  <div class="ph-panel"><div id="phrase-content"></div></div>
</div>

<!-- Edit Overlay -->
<div class="ed-overlay" id="edit-overlay" onclick="if(event.target===this)closeEdit()">
  <div class="ed-panel"><div id="edit-content"></div></div>
</div>

<!-- Menu Overlay -->
<div class="app-menu" id="app-menu" onclick="if(event.target===this)closeMenu()">
  <div class="menu-panel">
    <div class="menu-item" onclick="showGuide()"><span>&#x1F4D6;</span> Guida</div>
    <div class="menu-item" onclick="closeMenu();confirmReset()"><span>&#x1F504;</span> Ripristina itinerario</div>
    <div class="menu-item" onclick="closeMenu();exportDiary()"><span>&#x1F4BE;</span> Esporta diario</div>
    <div class="menu-item" onclick="toggleTheme()"><span id="theme-ico">&#x1F319;</span> <span id="theme-label">Tema chiaro</span></div>
    <div class="menu-item" onclick="closeMenu()"><span>&#x2715;</span> Chiudi</div>
  </div>
</div>

<!-- Scripts -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="config.js"></script>
<script src="data.js"></script>
<script src="app.js"></script>
<script src="geo-override.js"></script>
</body>
</html>
